<template>
    <lightning-card icon-name="standard:metrics">

        <!-- ── Card Header: title + Edit button (view mode) ── -->
        <span slot="title">
            Rollup Configuration
            <template if:true={isViewMode}>
                <template if:true={hasObject}>
                    <span class={activeBadgeClass}>{activeLabel}</span>
                </template>
            </template>
        </span>
        <div slot="actions">
            <template if:true={isViewMode}>
                <template if:true={hasObject}>
                    <lightning-button-icon
                        icon-name="utility:edit"
                        variant="border-filled"
                        alternative-text="Edit"
                        title="Edit"
                        onclick={handleEdit}>
                    </lightning-button-icon>
                </template>
                <template if:true={showRecalcButton}>
                    <lightning-button
                        label="Recalculate All"
                        icon-name="utility:refresh"
                        variant="neutral"
                        onclick={handleRecalculateAll}
                        disabled={recalcDisabled}
                        class="slds-m-left_x-small">
                    </lightning-button>
                </template>
                <template if:true={recalculating}>
                    <lightning-spinner alternative-text="Starting batch..." size="x-small"></lightning-spinner>
                </template>
            </template>
        </div>

        <div class="slds-p-horizontal_medium slds-p-bottom_medium">

            <!-- Object picker / read-only display -->
            <div class="rc-objrow">
                <template if:true={isRecordMode}>
                    <div class="rc-obj-readonly">
                        <span class="rc-obj-label">Applicable Object</span>
                        <span class="rc-obj-value">{objectDisplay}</span>
                    </div>
                </template>
                <template if:false={isRecordMode}>
                    <lightning-combobox
                        label="Applicable Object"
                        placeholder="Select the object rollups run from..."
                        value={objectApi}
                        options={objectOptions}
                        onchange={handleObjectChange}
                        disabled={isViewMode}>
                    </lightning-combobox>
                </template>

                <!-- Active toggle — edit mode only -->
                <template if:true={isEditMode}>
                    <template if:true={hasObject}>
                        <lightning-input
                            type="toggle"
                            label="Active"
                            message-toggle-active="On"
                            message-toggle-inactive="Off"
                            checked={active}
                            onchange={handleActiveToggle}
                            class="rc-active">
                        </lightning-input>
                    </template>
                </template>
            </div>

            <template if:true={loading}>
                <lightning-spinner alternative-text="Loading..." size="small"></lightning-spinner>
            </template>

            <!-- Object error banner -->
            <template if:true={hasObjectError}>
                <div class="rc-object-error">
                    <lightning-icon icon-name="utility:error" size="small" variant="error" class="slds-m-right_x-small"></lightning-icon>
                    <span>{objectError}</span>
                </div>
            </template>

            <template if:true={hasObject}>

                <!-- Help text — edit mode only -->
                <template if:true={isEditMode}>
                    <p class="rc-help">
                        All rollups for this object are saved together. Adding another lookup field just adds a
                        rule below &mdash; it never creates a separate configuration record.
                    </p>

                    <!-- No lookup fields warning -->
                    <template if:true={noLookupFields}>
                        <div class="rc-warn-box">
                            <lightning-icon icon-name="utility:warning" size="small" variant="warning" class="slds-m-right_x-small"></lightning-icon>
                            <span>No lookup (relationship) fields found on <strong>{objectApi}</strong>. Rollups require at least one lookup field pointing to a parent object.</span>
                        </div>
                    </template>

                    <!-- TOP actions bar (edit mode) -->
                    <div class="rc-actions rc-actions-top">
                        <lightning-button
                            label="Add Rollup Rule"
                            icon-name="utility:add"
                            variant="neutral"
                            onclick={handleAddRule}>
                        </lightning-button>
                        <lightning-button
                            label="Save"
                            icon-name="utility:save"
                            variant="brand"
                            onclick={handleSave}
                            disabled={saveDisabled}
                            class="slds-m-left_x-small">
                        </lightning-button>
                        <lightning-button
                            label="Cancel"
                            variant="neutral"
                            onclick={handleCancel}
                            class="slds-m-left_x-small">
                        </lightning-button>
                        <template if:true={saving}>
                            <lightning-spinner alternative-text="Saving..." size="x-small"></lightning-spinner>
                        </template>
                    </div>
                </template>

                <!-- ══════════════════════════════════════════════════════ -->
                <!--  RULES — VIEW MODE                                     -->
                <!-- ══════════════════════════════════════════════════════ -->
                <template if:true={isViewMode}>
                    <template for:each={ruleRows} for:item="rule">
                        <div key={rule.key} class="rc-rule rc-rule-view">
                            <div class="rc-rule-head">
                                <span class="rc-num">{rule.num}</span>
                                <span class="rc-parent-badge">{rule.parentBadge}</span>
                                <span class={rule.activeBadgeClass}>{rule.activeLabel}</span>
                            </div>
                            <div class="rc-view-grid">
                                <div class="rc-view-field">
                                    <span class="rc-view-label">Lookup Field</span>
                                    <span class="rc-view-value">{rule.lookupLabel}</span>
                                </div>
                                <div class="rc-view-field">
                                    <span class="rc-view-label">Operation</span>
                                    <span class="rc-view-value">{rule.operationLabel}</span>
                                </div>
                                <div class="rc-view-field">
                                    <span class="rc-view-label">Source Field</span>
                                    <span class="rc-view-value">{rule.sourceLabel}</span>
                                </div>
                                <div class="rc-view-field">
                                    <span class="rc-view-label">Target Field</span>
                                    <span class="rc-view-value">{rule.targetLabel}</span>
                                </div>
                                <div class="rc-view-field">
                                    <span class="rc-view-label">Mode</span>
                                    <span class="rc-view-value">{rule.modeLabel}</span>
                                </div>
                                <div class="rc-view-field">
                                    <span class="rc-view-label">Filter</span>
                                    <span class="rc-view-value">{rule.filterSummary}</span>
                                </div>
                            </div>
                        </div>
                    </template>
                    <template if:false={hasRules}>
                        <div class="rc-no-rules">
                            <lightning-icon icon-name="utility:info" size="small" class="slds-m-right_x-small"></lightning-icon>
                            No rollup rules configured yet. Click Edit to add rules.
                        </div>
                    </template>
                </template>

                <!-- ══════════════════════════════════════════════════════ -->
                <!--  RULES — EDIT MODE                                     -->
                <!-- ══════════════════════════════════════════════════════ -->
                <template if:true={isEditMode}>
                    <template for:each={ruleRows} for:item="rule">
                        <div key={rule.key} class="rc-rule">
                            <div class="rc-rule-head">
                                <span class="rc-num">{rule.num}</span>
                                <span class="rc-parent-badge">{rule.parentBadge}</span>
                                <lightning-input
                                    type="toggle"
                                    label=""
                                    message-toggle-active="Active"
                                    message-toggle-inactive="Inactive"
                                    checked={rule.active}
                                    data-index={rule.index}
                                    data-field="active"
                                    onchange={handleRuleChange}
                                    class="rc-rule-active">
                                </lightning-input>
                                <button class="rc-remove" data-index={rule.index} onclick={handleRemoveRule} title="Remove rule">&#10005;</button>
                            </div>

                            <div class="rc-grid">
                                <lightning-combobox
                                    label="Lookup field (→ parent)"
                                    value={rule.lookupField}
                                    options={lookupOptions}
                                    placeholder="Select lookup..."
                                    data-index={rule.index}
                                    data-field="lookupField"
                                    onchange={handleRuleChange}>
                                </lightning-combobox>

                                <lightning-combobox
                                    label="Operation"
                                    value={rule.operation}
                                    options={operationOptions}
                                    data-index={rule.index}
                                    data-field="operation"
                                    onchange={handleRuleChange}>
                                </lightning-combobox>

                                <template if:true={rule.showSource}>
                                    <lightning-combobox
                                        label="Source field (on this object)"
                                        value={rule.sourceField}
                                        options={rule.sourceOptions}
                                        placeholder="Field to aggregate..."
                                        data-index={rule.index}
                                        data-field="sourceField"
                                        onchange={handleRuleChange}>
                                    </lightning-combobox>
                                </template>
                                <template if:false={rule.showSource}>
                                    <div class="rc-novalue">Count needs no source field</div>
                                </template>

                                <lightning-combobox
                                    label="Target field (on parent)"
                                    value={rule.targetField}
                                    options={rule.targetOptions}
                                    placeholder="Field to write result..."
                                    disabled={rule.targetDisabled}
                                    data-index={rule.index}
                                    data-field="targetField"
                                    onchange={handleRuleChange}>
                                </lightning-combobox>

                                <lightning-combobox
                                    label="Mode"
                                    value={rule.mode}
                                    options={modeOptions}
                                    data-index={rule.index}
                                    data-field="mode"
                                    onchange={handleRuleChange}>
                                </lightning-combobox>

                                <template if:true={rule.showDelimiter}>
                                    <lightning-input
                                        label="Concat delimiter"
                                        value={rule.concatDelimiter}
                                        data-index={rule.index}
                                        data-field="concatDelimiter"
                                        onchange={handleRuleChange}>
                                    </lightning-input>
                                </template>

                                <template if:true={rule.showQueueableHint}>
                                    <div class="rc-queueable-hint">
                                        <lightning-icon icon-name="utility:clock" size="xx-small" class="slds-m-right_x-small"></lightning-icon>
                                        Queueable mode runs in the background — parent fields update within ~5 seconds after the child record saves.
                                    </div>
                                </template>
                            </div>

                            <div class="rc-filter">
                                <button type="button" class="rc-filter-toggle" data-index={rule.index} onclick={handleOpenFilterModal}>
                                    <lightning-icon icon-name="utility:filterList" size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                                    Filter: {rule.filterSummary}
                                </button>
                            </div>
                        </div>
                    </template>

                    <!-- BOTTOM actions bar (edit mode) -->
                    <div class="rc-actions">
                        <lightning-button
                            label="Add Rollup Rule"
                            icon-name="utility:add"
                            variant="neutral"
                            onclick={handleAddRule}>
                        </lightning-button>
                        <lightning-button
                            label="Save"
                            icon-name="utility:save"
                            variant="brand"
                            onclick={handleSave}
                            disabled={saveDisabled}
                            class="slds-m-left_x-small">
                        </lightning-button>
                        <lightning-button
                            label="Cancel"
                            variant="neutral"
                            onclick={handleCancel}
                            class="slds-m-left_x-small">
                        </lightning-button>
                        <template if:true={saving}>
                            <lightning-spinner alternative-text="Saving..." size="x-small"></lightning-spinner>
                        </template>
                    </div>
                </template>

            </template>
        </div>
    </lightning-card>

    <!-- ── FILTER CONDITIONS MODAL ── -->
    <template if:true={showFilterModal}>
        <div class="rc-modal-backdrop" onclick={handleFilterModalBackdrop}>
            <div class="rc-modal" onclick={stopProp}>
                <div class="rc-modal-head">
                    <span>
                        <lightning-icon icon-name="utility:filterList" size="small" variant="inverse" class="slds-m-right_x-small"></lightning-icon>
                        Filter &mdash; Rule {filterRuleNumber}
                    </span>
                    <button class="rc-modal-x" onclick={handleCloseFilterModal} title="Close">&#10005;</button>
                </div>

                <div class="rc-modal-body">
                    <p class="rc-modal-help">Only child records matching these conditions are included in the rollup. Leave empty to include all records.</p>

                    <div style="max-width:280px;">
                        <lightning-combobox
                            label="Match"
                            value={filterLogic}
                            options={filterLogicOptions}
                            onchange={handleFilterLogicChange}>
                        </lightning-combobox>
                    </div>

                    <template if:true={isFilterCustom}>
                        <div class="rc-custom-box">
                            <lightning-input
                                label="Custom logic"
                                value={filterCustomLogic}
                                placeholder="e.g. 1 AND (2 OR 3)"
                                onchange={handleFilterCustomLogicChange}>
                            </lightning-input>
                            <template if:true={hasFilterCustomError}>
                                <p class="rc-custom-err">&#9888; {filterCustomError}</p>
                            </template>
                            <p class="rc-custom-hint">Reference conditions by number. Use AND, OR, NOT and parentheses.</p>
                        </div>
                    </template>

                    <p class="rc-cond-title">Conditions</p>
                    <div class="rc-traverse-hint">
                        &#128161; Pick a field marked <b>&#9656;</b> (a lookup) to traverse into the related object &mdash; e.g. <b>Account &#9656;</b> then <b>Type</b>.
                    </div>

                    <template for:each={filterConditions} for:item="cond">
                        <div key={cond.key} class="rc-cond-row">
                            <div class="rc-cond-num">{cond.number}</div>
                            <div class="rc-cond-main">
                                <template if:true={cond.hasPath}>
                                    <div class="rc-path">
                                        <span class="rc-path-text">{cond.pathLabel} &#9656;</span>
                                        <button type="button" class="rc-path-reset" data-index={cond.index} onclick={handleFilterFieldReset} title="Reset field">&#8634;</button>
                                    </div>
                                </template>
                                <div class="rc-cond-grid">
                                    <lightning-combobox label="Field" value={cond.fieldValue} options={cond.fieldOptions} placeholder="Pick a field..." data-index={cond.index} onchange={handleFilterFieldChange}></lightning-combobox>
                                    <lightning-combobox label="Operator" value={cond.operator} options={cond.operatorOptions} data-index={cond.index} onchange={handleFilterOperatorChange}></lightning-combobox>
                                    <template if:true={cond.isPicklistVal}>
                                        <lightning-combobox label="Value" value={cond.value} options={cond.picklistValueOptions} placeholder="Pick a value..." data-index={cond.index} onchange={handleFilterValueChange}></lightning-combobox>
                                    </template>
                                    <template if:true={cond.isBooleanVal}>
                                        <lightning-combobox label="Value" value={cond.value} options={cond.booleanValueOptions} placeholder="True / False" data-index={cond.index} onchange={handleFilterValueChange}></lightning-combobox>
                                    </template>
                                    <template if:true={cond.isDateVal}>
                                        <lightning-input type="date" label="Date" value={cond.value} data-index={cond.index} onchange={handleFilterValueChange}></lightning-input>
                                    </template>
                                    <template if:true={cond.isRelativeVal}>
                                        <lightning-input type="number" label="Number of days (N)" min="1" value={cond.value} data-index={cond.index} onchange={handleFilterValueChange}></lightning-input>
                                    </template>
                                    <template if:true={cond.isInList}>
                                        <lightning-input label="Values (comma-separated)" value={cond.value} placeholder="e.g. Open, Pending" data-index={cond.index} onchange={handleFilterValueChange}></lightning-input>
                                    </template>
                                    <template if:true={cond.isTextVal}>
                                        <lightning-input label="Value" value={cond.value} placeholder="e.g. Closed Won" data-index={cond.index} onchange={handleFilterValueChange}></lightning-input>
                                    </template>
                                    <template if:false={cond.needsValue}>
                                        <div class="rc-cond-novalue">(no value needed)</div>
                                    </template>
                                </div>
                                <template if:true={cond.isRelativeVal}>
                                    <div class="rc-presets">
                                        <template for:each={filterRelativePresets} for:item="p">
                                            <button key={p.key} type="button" class="rc-preset-chip" data-index={cond.index} data-n={p.n} onclick={handleFilterRelativePreset}>{p.n}d</button>
                                        </template>
                                    </div>
                                </template>
                            </div>
                            <button type="button" class="rc-cond-remove" data-index={cond.index} onclick={handleRemoveFilterCondition} title="Remove condition">&#10005;</button>
                        </div>
                        <template if:true={cond.showLogicSep}>
                            <div key={cond.sepKey} class="rc-logic-sep">{filterLogic}</div>
                        </template>
                    </template>

                    <button type="button" class="rc-add-cond" onclick={handleAddFilterCondition}>&#43;&nbsp; Add Condition</button>

                    <div class="rc-preview">
                        <span class="rc-preview-label">Filter preview</span>
                        <code class="rc-preview-code">{filterPreviewText}</code>
                    </div>
                </div>

                <div class="rc-modal-foot">
                    <lightning-button label="Done" variant="brand" onclick={handleCloseFilterModal}></lightning-button>
                </div>
            </div>
        </div>
    </template>
</template>
