<template>
    <lightning-card title="Recalculate All Rollups" icon-name="utility:refresh">
        <div class="slds-p-around_medium">

            <template if:false={isLoading}>
                <div class="ra-body">
                    <div class="ra-icon">
                        <lightning-icon icon-name="utility:warning" variant="warning" size="large"></lightning-icon>
                    </div>
                    <div class="ra-content">
                        <p class="ra-title">Are you sure you want to recalculate?</p>
                        <p class="ra-desc">
                            This will run a batch job across <strong>all existing records</strong> for this configuration
                            and recalculate every rollup rule from scratch.
                        </p>
                        <p class="ra-note">
                            &#9432; This may take a few minutes depending on the number of records.
                            Parent records will be updated in the background — you can continue working.
                        </p>
                    </div>
                </div>

                <div class="ra-actions">
                    <lightning-button
                        label="Cancel"
                        variant="neutral"
                        onclick={handleCancel}>
                    </lightning-button>
                    <lightning-button
                        label="Yes, Recalculate"
                        variant="brand"
                        icon-name="utility:refresh"
                        onclick={handleConfirm}
                        class="slds-m-left_x-small">
                    </lightning-button>
                </div>
            </template>

            <template if:true={isLoading}>
                <div class="ra-loading">
                    <lightning-spinner alternative-text="Starting batch job..." size="medium"></lightning-spinner>
                    <p class="ra-loading-text">Starting recalculation...</p>
                </div>
            </template>

        </div>
    </lightning-card>
</template>
